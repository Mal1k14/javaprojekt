# Имя приложения
spring.application.name=sports-groups

# H2 консоль
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# База данных
spring.datasource.url=jdbc:h2:file:./data/sportsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate - создаёт/обновляет таблицы автоматически
spring.jpa.hibernate.ddl-auto=update

# Liquibase - ОТКЛЮЧИТЬ!
spring.liquibase.enabled=false

# SQL логи
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT настройки
jwt.secret=MySuperSecretKeyForJWTTokenGeneration12345678901234567890
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Sports Groups Manager
info.app.description=Сервис управления спортивными группами
info.app.version=1.0.0

# Логирование
logging.level.com.sport.sportsgroups=INFO
logging.level.org.springframework.web=INFO